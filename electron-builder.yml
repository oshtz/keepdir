appId: com.oshtz.keepdir
productName: KeepDir
copyright: Copyright © 2026 oshtz

asar: true
asarUnpack:
  - node_modules/sqlite3/**/*.node
  - node_modules/sharp/**/*.{node,dll,dylib,so}

directories:
  output: out
  buildResources: assets

files:
  - package.json
  - src/main/**/*
  - dist/**/*

publish:
  provider: github
  owner: oshtz
  repo: keepdir

electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true

win:
  icon: assets/icon.ico
  artifactName: KeepDir-Setup-${version}.${ext}
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KeepDir
  deleteAppDataOnUninstall: false

mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.plist
  artifactName: KeepDir-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  format: ULFO
