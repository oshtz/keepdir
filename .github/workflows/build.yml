name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      replace_existing_release:
        description: 'Replace assets on an existing release for the current package version'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-windows:
    # Pin the Windows image so release builds are not changed by windows-latest redirects.
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build webpack bundle
        run: npm run build

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run make -- --platform win32
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $installer = Get-ChildItem -Path "out\make" -Filter "KeepDir-Setup-*.exe" -File -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not created in out/make"
          }

          $size = [math]::Round($installer.Length / 1MB, 2)
          Write-Host "Windows installer created: $($installer.FullName) ($size MB)"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-windows-installer
          path: out/make/**/KeepDir-Setup-*.exe

  build-macos:
    # Pin the macOS ARM image so release builds are not changed by macos-latest redirects.
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build webpack bundle
        run: npm run build

      - name: Import Apple certificate
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::warning::Missing Apple signing secrets. Building unsigned app."
            exit 0
          fi

          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" "login.keychain-db"
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Certificate imported successfully"

      - name: Build and sign macOS app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            export OSX_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY"
          fi
          npm run make -- --platform darwin

      - name: Notarize macOS app
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::warning::Missing notarization secrets. Skipping notarization."
            exit 0
          fi

          DMG_FILE=$(find out/make -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "::warning::No DMG file found for notarization"
            exit 0
          fi

          echo "Notarizing: $DMG_FILE"

          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD"

          xcrun notarytool submit "$DMG_FILE" \
            --keychain-profile "notarytool-profile" \
            --wait

          xcrun stapler staple "$DMG_FILE"

          echo "Notarization completed"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-macos-dmg
          path: out/make/**/*.dmg

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Determine release tag
        id: release_tag
        run: |
          version=$(node -p "require('./package.json').version")
          if [ -z "$version" ]; then
            echo "package.json version not found"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          mapfile -t installers < <(find release-artifacts -type f \( -name "*.exe" -o -name "*.dmg" \) | sort)
          mapfile -t unexpected < <(find release-artifacts -type f ! \( -name "*.exe" -o -name "*.dmg" \) | sort)

          if [ "${#unexpected[@]}" -ne 0 ]; then
            printf 'Unexpected release artifact: %s\n' "${unexpected[@]}"
            exit 1
          fi

          if [ "${#installers[@]}" -ne 2 ]; then
            echo "Expected exactly 2 release installers (.exe and .dmg), found ${#installers[@]}"
            printf 'Installer candidate: %s\n' "${installers[@]}"
            exit 1
          fi

          exe_count=$(printf '%s\n' "${installers[@]}" | grep -Ec '\.exe$' || true)
          dmg_count=$(printf '%s\n' "${installers[@]}" | grep -Ec '\.dmg$' || true)
          if [ "$exe_count" -ne 1 ] || [ "$dmg_count" -ne 1 ]; then
            echo "Expected one Windows installer EXE and one macOS DMG"
            printf 'Installer candidate: %s\n' "${installers[@]}"
            exit 1
          fi

          sha256sum "${installers[@]}"

      - name: Check for existing release
        id: release_check
        uses: actions/github-script@v9
        with:
          script: |
            const tag = '${{ steps.release_tag.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Create GitHub release
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/**/*

      - name: Skip existing release upload
        if: steps.release_check.outputs.exists == 'true' && (github.event_name != 'workflow_dispatch' || inputs.replace_existing_release != true)
        run: |
          echo "Release ${{ steps.release_tag.outputs.tag }} already exists; skipping asset upload."
          echo "Run this workflow manually with replace_existing_release=true to replace existing release assets."

      - name: Upload to existing release
        if: steps.release_check.outputs.exists == 'true' && github.event_name == 'workflow_dispatch' && inputs.replace_existing_release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: release-artifacts/**/*
