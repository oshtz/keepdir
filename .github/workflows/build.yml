name: Build and Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      replace_existing_release:
        description: 'Replace assets on an existing release for the current package version'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  build-windows:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable app
        shell: pwsh
        run: |
          npm run dist:win
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-windows-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/portable/KeepDir-portable.exe
            src-tauri/target/release/portable/SHA256SUMS-windows.txt

  build-macos:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check macOS signing prerequisites
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [ -z "$SECRET_APPLE_CERTIFICATE" ] && missing+=("APPLE_CERTIFICATE")
          [ -z "$SECRET_APPLE_CERTIFICATE_PASSWORD" ] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -z "$SECRET_APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$SECRET_APPLE_PASSWORD" ] && missing+=("APPLE_PASSWORD")
          [ -z "$SECRET_APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")

          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing macOS release secret: %s\n' "${missing[@]}"
            exit 1
          fi

          echo "macOS signing and notarization inputs are present."

      - name: Build macOS DMG
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          [ -n "$SECRET_APPLE_CERTIFICATE" ] && export APPLE_CERTIFICATE="$SECRET_APPLE_CERTIFICATE"
          [ -n "$SECRET_APPLE_CERTIFICATE_PASSWORD" ] && export APPLE_CERTIFICATE_PASSWORD="$SECRET_APPLE_CERTIFICATE_PASSWORD"
          [ -n "$SECRET_APPLE_ID" ] && export APPLE_ID="$SECRET_APPLE_ID"
          [ -n "$SECRET_APPLE_PASSWORD" ] && export APPLE_PASSWORD="$SECRET_APPLE_PASSWORD"
          [ -n "$SECRET_APPLE_TEAM_ID" ] && export APPLE_TEAM_ID="$SECRET_APPLE_TEAM_ID"
          [ -n "$SECRET_APPLE_SIGNING_IDENTITY" ] && export APPLE_SIGNING_IDENTITY="$SECRET_APPLE_SIGNING_IDENTITY"
          [ -n "$SECRET_APPLE_PROVIDER_SHORT_NAME" ] && export APPLE_PROVIDER_SHORT_NAME="$SECRET_APPLE_PROVIDER_SHORT_NAME"

          npm run dist:mac

          bundle_dir="src-tauri/target/release/bundle/dmg"
          dmg="$(find "$bundle_dir" -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "macOS DMG was not created in $bundle_dir"
            exit 1
          fi

          size="$(stat -f%z "$dmg")"
          if [ "$size" -lt 1048576 ]; then
            echo "macOS DMG is unexpectedly small: $size bytes"
            exit 1
          fi

          manifest="$bundle_dir/SHA256SUMS-macos.txt"
          (cd "$bundle_dir" && shasum -a 256 "$(basename "$dmg")") > "$manifest"
          echo "macOS DMG created: $dmg"
          echo "macOS checksum manifest created: $manifest"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-macos-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/SHA256SUMS-macos.txt

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Determine release tag
        id: release_tag
        run: |
          version=$(node -p "require('./package.json').version")
          if [ -z "$version" ]; then
            echo "package.json version not found"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          mapfile -t release_files < <(find release-artifacts -type f \( -name "*.exe" -o -name "*.dmg" \) | sort)
          mapfile -t manifests < <(find release-artifacts -type f -name "SHA256SUMS-*.txt" | sort)
          mapfile -t unexpected < <(find release-artifacts -type f ! \( -name "*.exe" -o -name "*.dmg" -o -name "SHA256SUMS-*.txt" \) | sort)

          if [ "${#unexpected[@]}" -ne 0 ]; then
            printf 'Unexpected release artifact: %s\n' "${unexpected[@]}"
            exit 1
          fi

          if [ "${#release_files[@]}" -ne 2 ]; then
            echo "Expected exactly 2 release artifacts (.exe and .dmg), found ${#release_files[@]}"
            printf 'Release artifact candidate: %s\n' "${release_files[@]}"
            exit 1
          fi

          exe_count=$(printf '%s\n' "${release_files[@]}" | grep -Ec '\.exe$' || true)
          dmg_count=$(printf '%s\n' "${release_files[@]}" | grep -Ec '\.dmg$' || true)
          if [ "$exe_count" -ne 1 ] || [ "$dmg_count" -ne 1 ]; then
            echo "Expected one Windows portable EXE and one macOS DMG"
            printf 'Release artifact candidate: %s\n' "${release_files[@]}"
            exit 1
          fi

          if [ "${#manifests[@]}" -ne 2 ]; then
            echo "Expected exactly 2 checksum manifests, found ${#manifests[@]}"
            printf 'Checksum candidate: %s\n' "${manifests[@]}"
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            (cd "$(dirname "$manifest")" && sha256sum -c "$(basename "$manifest")")
          done

      - name: Check for existing release
        id: release_check
        uses: actions/github-script@v9
        with:
          script: |
            const tag = '${{ steps.release_tag.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Create GitHub release
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/**/*

      - name: Skip existing release upload
        if: steps.release_check.outputs.exists == 'true' && (github.event_name != 'workflow_dispatch' || inputs.replace_existing_release != true)
        run: |
          echo "Release ${{ steps.release_tag.outputs.tag }} already exists; skipping asset upload."
          echo "Run this workflow manually with replace_existing_release=true to replace existing release assets."

      - name: Upload to existing release
        if: steps.release_check.outputs.exists == 'true' && github.event_name == 'workflow_dispatch' && inputs.replace_existing_release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: release-artifacts/**/*
