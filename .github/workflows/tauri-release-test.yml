name: Tauri Release Test

on:
  push:
    branches: ['codex/tauri-release-test']

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  build-windows:
    needs: validate
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable app
        shell: pwsh
        run: |
          npm run dist:win
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Windows release test artifact
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-windows-release-test
          if-no-files-found: error
          path: |
            src-tauri/target/release/portable/KeepDir-portable.exe
            src-tauri/target/release/portable/SHA256SUMS-windows.txt

  build-macos:
    needs: validate
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check macOS signing prerequisites
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [ -z "$SECRET_APPLE_CERTIFICATE" ] && missing+=("APPLE_CERTIFICATE")
          [ -z "$SECRET_APPLE_CERTIFICATE_PASSWORD" ] && missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -z "$SECRET_APPLE_ID" ] && missing+=("APPLE_ID")
          [ -z "$SECRET_APPLE_PASSWORD" ] && missing+=("APPLE_PASSWORD")
          [ -z "$SECRET_APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")

          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing macOS release secret: %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Build macOS DMG
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          [ -n "$SECRET_APPLE_CERTIFICATE" ] && export APPLE_CERTIFICATE="$SECRET_APPLE_CERTIFICATE"
          [ -n "$SECRET_APPLE_CERTIFICATE_PASSWORD" ] && export APPLE_CERTIFICATE_PASSWORD="$SECRET_APPLE_CERTIFICATE_PASSWORD"
          [ -n "$SECRET_APPLE_ID" ] && export APPLE_ID="$SECRET_APPLE_ID"
          [ -n "$SECRET_APPLE_PASSWORD" ] && export APPLE_PASSWORD="$SECRET_APPLE_PASSWORD"
          [ -n "$SECRET_APPLE_TEAM_ID" ] && export APPLE_TEAM_ID="$SECRET_APPLE_TEAM_ID"
          [ -n "$SECRET_APPLE_SIGNING_IDENTITY" ] && export APPLE_SIGNING_IDENTITY="$SECRET_APPLE_SIGNING_IDENTITY"
          [ -n "$SECRET_APPLE_PROVIDER_SHORT_NAME" ] && export APPLE_PROVIDER_SHORT_NAME="$SECRET_APPLE_PROVIDER_SHORT_NAME"

          npm run dist:mac

          bundle_dir="src-tauri/target/release/bundle/dmg"
          dmg="$(find "$bundle_dir" -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "macOS DMG was not created in $bundle_dir"
            exit 1
          fi

          size="$(stat -f%z "$dmg")"
          if [ "$size" -lt 1048576 ]; then
            echo "macOS DMG is unexpectedly small: $size bytes"
            exit 1
          fi

          manifest="$bundle_dir/SHA256SUMS-macos.txt"
          (cd "$bundle_dir" && shasum -a 256 "$(basename "$dmg")") > "$manifest"

      - name: Upload macOS release test artifact
        uses: actions/upload-artifact@v7
        with:
          name: keepdir-macos-release-test
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/SHA256SUMS-macos.txt
